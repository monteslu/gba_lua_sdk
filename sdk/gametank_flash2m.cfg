# GameTank FLASH2M (2 MB flash cart) ld65 config — the Tier-B banked path.
# $C000-$FFFF is the FIXED window (always the last 16 KB bank, #127): runtime,
# vectors, shared code, cross-bank call stubs. $8000-$BFFF is the switched
# 16 KB window (gt_bank.s): three banks hold game code + the sprite sheet.
# ld65 emits BANK0|BANK1|BANK2|BANK3|FIXED back to back (80 KB); bin/gtlua.js
# places them into the 2 MB flash image (bank n at n*0x4000, FIXED at
# 0x1FC000) that the emulator size-detects as FLASH2M. BANK3 is the audio
# unit's private bank (firmware + sequencer + converted sfx/music blobs) —
# game code never places there.
MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    RAM:   start = $0200, size = $1D00, define = yes;
    BANK0: start = $8000, size = $4000, file = %O, fill = yes, define = yes;
    BANK1: start = $8000, size = $4000, file = %O, fill = yes, define = yes;
    BANK2: start = $8000, size = $4000, file = %O, fill = yes, define = yes;
    BANK3: start = $8000, size = $4000, file = %O, fill = yes, define = yes;
    ROM:   start = $C000, size = $4000, file = %O, fill = yes, define = yes;
}
SEGMENTS {
    ZEROPAGE: load = ZP,  type = zp,  define = yes;
    DATA:     load = ROM, type = rw,  define = yes, run = RAM;
    BSS:      load = RAM, type = bss, define = yes;
    HEAP:     load = RAM, type = bss, optional = yes;
    STARTUP:  load = ROM, type = ro;
    ONCE:     load = ROM, type = ro,  optional = yes;
    CODE:     load = ROM, type = ro;
    RODATA:   load = ROM, type = ro;
    B0CODE:   load = BANK0, type = ro, optional = yes;
    B0RODATA: load = BANK0, type = ro, optional = yes;
    B1CODE:   load = BANK1, type = ro, optional = yes;
    B1RODATA: load = BANK1, type = ro, optional = yes;
    SHEET:    load = BANK2, type = ro, optional = yes;
    B2CODE:   load = BANK2, type = ro, optional = yes;
    B2RODATA: load = BANK2, type = ro, optional = yes;
    B3CODE:   load = BANK3, type = ro, optional = yes;
    B3RODATA: load = BANK3, type = ro, optional = yes;
    VECTORS:  load = ROM, type = ro,  start = $FFFA;
}
FEATURES {
    CONDES: type = constructor, label = __CONSTRUCTOR_TABLE__, count = __CONSTRUCTOR_COUNT__, segment = ONCE;
    CONDES: type = destructor,  label = __DESTRUCTOR_TABLE__,  count = __DESTRUCTOR_COUNT__,  segment = RODATA;
}
SYMBOLS {
    __STACKSIZE__: type = weak, value = $0200;
}
